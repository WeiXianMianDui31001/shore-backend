server:
  # 端口被占用时：PowerShell 用 `$env:SERVER_PORT=8081; mvn spring-boot:run`
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: shore-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:15432/shore_db?currentSchema=public&stringtype=unspecified
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  redis:
    host: localhost
    port: 6379
    database: 0
    password:
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 2

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.anzs.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Custom
shore:
  jwt:
    secret: "shore-backend-jwt-secret-key-2026-must-be-long-enough"
    access-token-expire: 7200000        # 2h (ms)
    refresh-token-expire: 604800000     # 7d (ms)
  pdf:
    temp-dir: ./temp/pdf

  # 生成 PDF / 证件照绝对地址；默认随 server.port（生产用 SHORE_PUBLIC_BASE_URL 覆盖）
  public-base-url: ${SHORE_PUBLIC_BASE_URL:http://localhost:${server.port}}

  upload:
    path: "D:/PicTemp"
